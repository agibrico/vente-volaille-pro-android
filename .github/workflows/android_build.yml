name: Compiler l'application Android (APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Compresser les fichiers pour VoltBuilder
      run: zip -r project.zip config.xml icon.png

    - name: Envoyer à VoltBuilder et Compiler l'APK
      id: voltbuilder
      run: |
        # Appel à l'API de compilation VoltBuilder
        RESPONSE=$(curl -s -X POST https://api.voltbuilder.com/v1/builds \
          -F "app=@project.zip" \
          -F "platform=android")
        
        # Récupération du lien de téléchargement de l'APK
        DOWNLOAD_URL=$(echo $RESPONSE | grep -o '"downloadURL":"[^"]*' | grep -o '[^"]*$')
        echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
        echo "APK généré avec succès !"

    - name: Sauvegarder le lien de l'application (APK)
      run: |
        echo "Félicitations ! Ton APK est prêt."
        echo "Tu peux le télécharger directement ici : ${{ env.DOWNLOAD_URL }}"
