name: Compiler l'application Android (APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Installer Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Installer Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Pré-configurer Bubblewrap (Acceptation automatique des licences)
      run: |
        mkdir -p ~/.bubblewrap
        echo '{"jdkPath":"/usr/lib/jvm/temurin-17-jdk-amd64","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json

    - name: Générer le projet Android et l'APK
      run: |
        # Initialise le projet Bubblewrap
        bubblewrap init --manifest twa-manifest.json --metaOut dir --yes
        
        # Génère une clé de signature temporaire obligatoire pour créer un APK installable
        keytool -genkeypair -v -keystore android.keystore -alias androidkey -keyalg RSA -keysize 2048 -validity 10000 -storepass vpro2026 -keypass vpro2026 -dname "CN=Gilles, O=FermesAbidjanaise, C=CI"
        
        # Crée un fichier de configuration pour que Bubblewrap sache où trouver la clé
        echo '{"keypath":"./android.keystore","alias":"androidkey"}' > twa-env.json
        
        # Lance la compilation finale de l'APK
        export BUBBLEWRAP_KEYSTORE_PASSWORD=vpro2026
        export BUBBLEWRAP_KEY_PASSWORD=vpro2026
        bubblewrap build --signingKeyPath ./android.keystore --signingKeyAlias androidkey --gplayRelease false
        
    - name: Sauvegarder l'application installable (APK)
      uses: actions/upload-artifact@v4
      with:
        name: Vente-Volaille-Pro-Android-APK
        path: ./*.apk
